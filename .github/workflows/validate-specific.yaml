---
# Project-type-specific validation jobs.
# Called by validate.yaml (master) via workflow_call.
# The category input controls which jobs run: 'integration' or 'theme'.

name: "Validate (Specific)"

"on":
  workflow_call:
    inputs:
      category:
        required: false
        type: string
        default: "integration"
        description: "Project type: 'integration', 'theme' or 'standard'"
      component_name:
        required: false
        type: string
        default: ""
        description: "Custom component directory name (integration only)"
      gist_id:
        required: false
        type: string
        default: ""
        description: "Gist ID for the dynamic coverage badge (integration only)"
    secrets:
      GIST_SECRET:
        required: false

permissions:
  contents: read

env:
  COMPONENT_PATH: custom_components/${{ inputs.component_name }}

jobs:
  # Job 1: GitHub Actions workflow security audit.
  zizmor:
    name: "Zizmor (Workflow Security)"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Zizmor
        run: pip install zizmor==1.25.2

      - name: Run Zizmor
        continue-on-error: false
        run: zizmor --pedantic .github/

  # Job 2: Official Home Assistant HASSfest validation.
  hassfest:
    name: "HA Hassfest"
    if: ${{ inputs.category == 'integration' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Hassfest Validation
        # Branch @master
        uses: home-assistant/actions/hassfest@e91ad1948e57189485b9c1ad608af0c303946f89

  # Job 3: Official HACS metadata validation.
  # category is passed through directly — 'integration' or 'theme'.
  hacs_val:
    name: "HACS Check"
    if: ${{ inputs.category != 'standard' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: HACS Validation
        # Branch @main
        uses: hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa
        with:
          category: ${{ inputs.category }}

  # Job 4: Python quality check via Ruff.
  py_val:
    name: "Python Lint (Ruff)"
    if: ${{ inputs.category == 'integration' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # Tag @v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Install Ruff
        run: pip install ruff==0.15.16

      - name: Run Ruff Check
        run: ruff check .

      - name: Run Ruff Format
        run: ruff format --check .

  # Job 5: Pytest and Dynamic Coverage Badge.
  # Runs all unit tests and updates the README badge automatically.
  test_val:
    name: "Tests & Coverage"
    if: ${{ inputs.category == 'integration' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # Tag @v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r .validate/requirements_test.txt
          pip install .

      - name: Run tests
        run: |
          pytest --cov="$COMPONENT_PATH" \
            --cov-report=term-missing \
            tests/

      - name: Extract Coverage Percentage
        id: extract_cov
        shell: bash
        run: |
          COVERAGE=$(coverage report | grep TOTAL | awk '{print $NF}' | tr -d '%')
          echo "PERCENTAGE=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Update Coverage Badge Gist
        # Tag @v1.8.0
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ inputs.gist_id }}
          filename: coverage.json
          label: Coverage
          message: ${{ steps.extract_cov.outputs.PERCENTAGE }}%
          valColorRange: ${{ steps.extract_cov.outputs.PERCENTAGE }}
          maxColorRange: 100
          minColorRange: 0

  # Job 6: File-level integrity (JSON schema, YAML, Prettier, README links).
  # HA Manifest Schema Check runs for integration only.
  file_val:
    name: "File Integrity"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # Tag @v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: HACS Schema Check
        if: ${{ inputs.category != 'standard' }}
        run: |
          pip install check-jsonschema==0.37.2
          check-jsonschema --schemafile .validate/hacs_schema.json hacs.json

      - name: HA Manifest Schema Check
        if: ${{ inputs.category == 'integration' }}
        run: |
          check-jsonschema \
            --schemafile .validate/ha_manifest_schema.json \
            "$COMPONENT_PATH"/manifest.json

      - name: YAML Check
        # Tag @v3
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c
        with:
          file_or_dir: .
          config_file: .validate/.yamllint

      - name: Prettier Format Check
        run: |
          npm install prettier@3.6.2 prettier-plugin-sort-json@4.2.0
          npx prettier --config .validate/.prettierrc.json --check "**/*.{md,json,yaml,yml}"

      - name: Check README Links
        # Tag @v1
        uses: gaurav-nelson/github-action-markdown-link-check@5c5dfc0ac2e225883c0e5f03a85311ec2830d368
        with:
          base-branch: main
          file-path: README.md
          config-file: .validate/.mlc_config.json

  # Job 7: Spell checking.
  # Both project types auto-discover codespell config from pyproject.toml [tool.codespell].
  codespell:
    name: "Codespell"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Run Codespell
        # Tag @v2.2
        uses: codespell-project/actions-codespell@8f01853be192eb0f849a5c7d721450e7a467c579

  # Job 8: Python type checking.
  mypy_val:
    name: "Python Types (Mypy)"
    if: ${{ inputs.category == 'integration' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Python
        # Tag @v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install mypy==2.1.0
          pip install -r .validate/requirements_test.txt

      - name: Run Mypy
        continue-on-error: false
        run: mypy custom_components/

  # Job 9: Theme-specific structural validation.
  # Ensures the repository layout matches HACS expectations for themes.
  structure_val:
    name: "Structure Check"
    if: ${{ inputs.category == 'theme' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Verify Theme Location
        # HACS requires theme YAML files to be inside the /themes/ directory.
        run: |
          if [ ! -f themes/*.yaml ]; then
            echo "Error: Theme file must be inside the /themes folder for HACS!"
            exit 1
          fi
