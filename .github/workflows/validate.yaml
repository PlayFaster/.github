---
# Master validation entry point for PlayFaster Home Assistant projects.
# Calls validate-common and validate-specific in parallel.
# Each project's validate.yaml stub calls this workflow via workflow_call.

name: "Validate (Shared)"

"on":
  workflow_call:
    inputs:
      category:
        required: false
        type: string
        default: "integration"
        description: "Project type: 'integration' or 'theme'"
      component_name:
        required: false
        type: string
        default: ""
        description: "Custom component directory name (integration only)"
      gist_id:
        required: false
        type: string
        default: ""
        description: "Gist ID for the dynamic coverage badge (integration only)"
    secrets:
      GIST_SECRET:
        required: false

permissions:
  contents: read

jobs:
  specific:
    permissions:
      contents: read
      pull-requests: write # pytest-coverage-comment posts PR comments on test_val
    uses: ./.github/workflows/validate-specific.yaml
    with:
      category: ${{ inputs.category }}
      component_name: ${{ inputs.component_name }}
      gist_id: ${{ inputs.gist_id }}
    secrets:
      GIST_SECRET: ${{ secrets.GIST_SECRET }}
