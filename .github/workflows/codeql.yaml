---
# Reusable CodeQL analysis workflow for PlayFaster Python integrations.
# Called by each integration repo's codeql.yml via workflow_call.

name: "CodeQL (Shared)"

"on":
  workflow_call:

permissions:
  contents: read

jobs:
  analyze:
    name: "CodeQL Analysis (Python)"
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to checkout the repository
      security-events: write # Required to upload CodeQL SARIF results to GitHub Security

    steps:
      - name: Checkout Repository
        # Tag @v4
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        # Tag @v3
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          languages: python

      - name: Perform CodeQL Analysis
        # Tag @v3
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357
        with:
          category: "/language:python"
